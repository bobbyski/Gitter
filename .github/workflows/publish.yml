name: Publish to PyPI

on:
  push:
    tags:
      - "*.*.*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Build package
        run: uv build

      - name: Install twine
        run: uv tool install twine

      - name: Verify built distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create source archive
        run: |
          git archive --format=tar.gz --prefix=gitter-${{ github.ref_name }}/ HEAD > gitter-${{ github.ref_name }}.tar.gz

      - name: Calculate SHA256
        id: sha
        run: |
          echo "sha256=$(shasum -a 256 gitter-${{ github.ref_name }}.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
